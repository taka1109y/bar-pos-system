function initHistory(basePrice) {
  const h = [];
  let p = basePrice;
  for (let i = 0; i < HIST_LEN; i++) {
    p = Math.max(100, p + (Math.random() - 0.5) * basePrice * 0.06);
    h.push(Math.round(p));
  }
  return h;
}

function nextPrice(history, basePrice) {
  const last = history[history.length - 1];
  // mean-reverting random walk
  const drift = (basePrice - last) * 0.05;
  const shock  = (Math.random() - 0.5) * basePrice * 0.08;
  return Math.max(100, Math.round(last + drift + shock));
}

// ── Sparkline ────────────────────────────────────────────────────────────────
function Sparkline({ history, color, width = 180, height = 40 }) {
  if (!history || history.length < 2) return null;
  const min = Math.min(...history);
  const max = Math.max(...history);
  const range = max - min || 1;
  const pts = history.map((v, i) => {
    const x = (i / (history.length - 1)) * width;
    const y = height - ((v - min) / range) * (height - 4) - 2;
    return `${x},${y}`;
  });
  const polyline = pts.join(' ');
  // filled area
  const area = `${pts[0].split(',')[0]},${height} ` + pts.join(' ') + ` ${pts[pts.length-1].split(',')[0]},${height}`;
  const lastX = (history.length - 1) / (history.length - 1) * width;
  const lastY = height - ((history[history.length-1] - min) / range) * (height - 4) - 2;

  return (
    <svg width={width} height={height} style={{ display:'block' }}>
      <defs>
        <linearGradient id={`sg-${color.replace('#','')}`} x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polygon points={area} fill={`url(#sg-${color.replace('#','')})`}/>
      <polyline points={polyline} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
      <circle cx={lastX} cy={lastY} r="3" fill={color} stroke="var(--bg)" strokeWidth="1.5"/>
    </svg>
  );
}

// ── ProductImage placeholder ──────────────────────────────────────────────────
function ProductImage({ sub }) {

  return (

    </div>
  );
}

// ── MenuCard ─────────────────────────────────────────────────────────────────
function MenuCard({ item, history, onOrder }) {
  const sub = ALL_SUBS.find(s => s.id === item.sub);
  const currentPrice = history ? history[history.length - 1] : item.basePrice;
  const prevPrice    = history && history.length > 1 ? history[history.length - 2] : currentPrice;
  const diff   = currentPrice - item.basePrice;
  const pct    = ((diff / item.basePrice) * 100).toFixed(1);
  const isUp   = currentPrice >= prevPrice;
  const color  = isUp ? 'var(--up)' : 'var(--down)';
  const flashKey = currentPrice; // used to trigger re-animation

  const [pressed, setPressed] = useState(false);

  return (
    <div
      onPointerDown={() => setPressed(true)}
      onPointerUp={() => { setPressed(false); onOrder(item, currentPrice); }}
      onPointerLeave={() => setPressed(false)}
      style={{
        background:'var(--surface2)', border:`1px solid ${pressed ? 'var(--red)' : 'var(--border)'}`,
        borderRadius: 12, overflow:'hidden', cursor:'pointer',
        transform: pressed ? 'scale(0.97)' : 'scale(1)',
        boxShadow: pressed ? `0 0 18px var(--red-glow)` : `0 2px 10px rgba(0,0,0,0.5)`,
        transition:'all 0.12s',
        display:'flex', flexDirection:'column',
        animation: 'flash-in 0.2s ease both',
      }}
    >
      <ProductImage sub={item.sub} />

      <div style={{ padding:'10px 10px 8px', flex:1, display:'flex', flexDirection:'column', gap: 4 }}>
        {/* name */}
        <div style={{ fontSize: 13, fontWeight: 700, color:'var(--text)', lineHeight:1.3 }}>{item.name}</div>
        <div style={{ fontSize: 9, color:'var(--text-dim)', lineHeight:1.4, marginBottom: 2 }}>{item.desc}</div>

        {/* price row */}
        <div style={{ display:'flex', alignItems:'baseline', gap: 6, marginBottom: 1 }}>
          <span style={{
            fontFamily:'Barlow Condensed', fontSize: 20, fontWeight: 700, color:'var(--gold)', letterSpacing:0.5,
            animation: `${isUp ? 'price-up' : 'price-down'} 0.8s ease`,
          }} key={flashKey}>
            ¥{currentPrice.toLocaleString()}
          </span>
          <span style={{
            fontFamily:'Barlow Condensed', fontSize: 11, fontWeight: 600,
            color: color, letterSpacing: 0.5,
          }}>
            {isUp ? '▲' : '▼'} {Math.abs(pct)}%
          </span>
        </div>

        {/* sparkline */}
        <div style={{ borderRadius: 6, overflow:'hidden', background:'rgba(0,0,0,0.3)', padding:'4px 4px 2px' }}>
          <Sparkline history={history} color={color} width={160} height={36} />
        </div>
      </div>

      {/* order button */}
      <div style={{
        background: pressed
          ? 'linear-gradient(90deg,#a01020,var(--red))'
          : 'linear-gradient(90deg,var(--red),#a01020)',
        padding:'7px 0', textAlign:'center',
        fontSize: 11, fontWeight: 700, color:'#fff', letterSpacing: 2,
        transition:'all 0.1s',
      }}>
        注　文
      </div>
    </div>
  );
}

// ── SentToast ─────────────────────────────────────────────────────────────────
function SentToast({ item, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2000); return () => clearTimeout(t); }, []);
  return (
    <div style={{
      position:'fixed', top:72, left:'50%',
      background:'var(--neon)', color:'#001a10',
      borderRadius:50, padding:'9px 26px',
      fontWeight:700, fontSize:13, zIndex:200,
      display:'flex', alignItems:'center', gap:8,
      boxShadow:'0 0 32px var(--neon-glow)',
      animation:'sent-pop 0.25s ease',
      whiteSpace:'nowrap',
    }}>
      <span style={{fontSize:16}}>✓</span>
      <span>「{item.name}」を注文しました ¥{item.orderPrice.toLocaleString()}</span>
    </div>
  );
}

// ── Price Ticker bar ──────────────────────────────────────────────────────────
function TickerBar({ priceMap }) {
  const items = MENU_BASE.slice(0,12);
  const content = items.map(item => {
    const h = priceMap[item.id];
    const cur = h ? h[h.length-1] : item.basePrice;
    const diff = ((cur - item.basePrice)/item.basePrice*100).toFixed(1);
    const up = cur >= item.basePrice;
    return `${item.name} ¥${cur.toLocaleString()} ${up?'▲':'▼'}${Math.abs(diff)}%`;
  }).join('　　　');
  return (
    <div style={{
      height: 22, background:'#0a0a0f', borderBottom:'1px solid var(--border)',
      overflow:'hidden', display:'flex', alignItems:'center',
    }}>
      <div style={{
        display:'inline-block', whiteSpace:'nowrap',
        animation:'ticker 30s linear infinite',
        fontSize: 9, letterSpacing: 1, color:'var(--text-dim)',
        paddingLeft:'100%',
      }}>
        {content}　　{content}
      </div>
    </div>
  );
}

        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:2 }}>

}

// ── TopBar ────────────────────────────────────────────────────────────────────

  const [time, setTime] = useState(new Date());
  useEffect(() => { const t = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(t); }, []);
  const hh = String(time.getHours()).padStart(2,'0');
  const mm = String(time.getMinutes()).padStart(2,'0');

        </div>
      </div>

        </div>
        <div style={{ textAlign:'right' }}>
          <div style={{ fontFamily:'Barlow Condensed', fontSize:20, color:'var(--text)', letterSpacing:1 }}>{hh}:{mm}</div>
          <div style={{ fontSize:8, color:'var(--text-dim)', letterSpacing:1 }}>{orderCount > 0 ? `${orderCount}品 注文済み` : '注文なし'}</div>
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [mainCat, setMainCat]   = useState('drink');
  const [subCat,  setSubCat]    = useState('beer');
  const [orders,  setOrders]    = useState(() => { try { return JSON.parse(localStorage.getItem('fanzone_orders') || '[]'); } catch { return []; } });
  const [pending, setPending]   = useState(null);
  const [toast,   setToast]     = useState(null);

  // price history: { [itemId]: number[] }
  const [priceMap, setPriceMap] = useState(() => {
    const m = {};
    MENU_BASE.forEach(item => { m[item.id] = initHistory(item.basePrice); });
    return m;
  });

  // live price ticker
  useEffect(() => {
    const t = setInterval(() => {
      setPriceMap(prev => {
        const next = { ...prev };
        MENU_BASE.forEach(item => {
          const h = [...prev[item.id]];
          h.push(nextPrice(h, item.basePrice));
          if (h.length > HIST_LEN) h.shift();
          next[item.id] = h;
        });
        return next;
      });
    }, TICK_MS);
    return () => clearInterval(t);
  }, []);

  // persist orders
  useEffect(() => { localStorage.setItem('fanzone_orders', JSON.stringify(orders)); }, [orders]);

  const handleMainCat = (id) => {
    setMainCat(id);
    setSubCat(SUB_CATS[id][0].id);
  };

  const handleOrder = (item, currentPrice) => setPending({ item, currentPrice });

  const handleConfirm = () => {
    const now = new Date();
    const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const entry = { ...pending.item, uid: Date.now(), time, orderPrice: pending.currentPrice };
    setOrders(prev => [...prev, entry]);
    setToast(entry);
    setPending(null);
  };

  const filteredMenu = MENU_BASE.filter(m => m.sub === subCat);
  const total = orders.reduce((s, o) => s + o.orderPrice, 0);

  return (
    <div style={{ width:1024, height:600, background:'var(--bg)', display:'flex', flexDirection:'column', overflow:'hidden' }}>
      <TopBar orderCount={orders.length} />
      <TickerBar priceMap={priceMap} />

      {/* body */}
      <div style={{ flex:1, display:'flex', overflow:'hidden' }}>

        {/* ── Sidebar ── */}
        <div style={{ width:130, background:'var(--surface)', borderRight:'1px solid var(--border)', display:'flex', flexDirection:'column', flexShrink:0 }}>
          <div style={{ padding:'8px 8px 4px', fontSize:8, color:'var(--text-muted)', letterSpacing:2, textAlign:'center' }}>メインカテゴリ</div>
          {MAIN_CATS.map(mc => {
            const active = mc.id === mainCat;
            return (
              <button key={mc.id} onClick={() => handleMainCat(mc.id)} style={{
                display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                padding:'12px 6px', margin:'3px 6px', borderRadius:10, border:'none', cursor:'pointer',
                background: active ? 'linear-gradient(135deg,var(--red),#9a1020)' : 'transparent',
                outline: active ? '1px solid var(--red)' : '1px solid transparent',
                color: active ? '#fff' : 'var(--text-dim)',
                transition:'all 0.15s',
                boxShadow: active ? '0 0 16px var(--red-glow)' : 'none',
                gap:4,
              }}>
                <span style={{ fontSize:24 }}>{mc.label.split(' ')[0]}</span>
                <span style={{ fontSize:11, fontWeight:700 }}>{mc.label.split(' ')[1]}</span>
              </button>
            );
          })}

          {/* divider */}
          <div style={{ margin:'8px 10px', borderTop:'1px solid var(--border)' }}/>
          <div style={{ padding:'0 8px 4px', fontSize:8, color:'var(--text-muted)', letterSpacing:2, textAlign:'center' }}>サブカテゴリ</div>

          {SUB_CATS[mainCat].map(sc => {
            const active = sc.id === subCat;
            return (
              <button key={sc.id} onClick={() => setSubCat(sc.id)} style={{
                display:'flex', alignItems:'center', gap:6,
                padding:'8px 10px', margin:'2px 6px', borderRadius:8, border:'none', cursor:'pointer',
                background: active ? `${sc.glowColor}22` : 'transparent',
                outline: active ? `1px solid ${sc.glowColor}66` : '1px solid transparent',
                color: active ? '#fff' : 'var(--text-dim)',
                transition:'all 0.13s',
                fontSize:11, fontWeight: active ? 700 : 400,
              }}>
                <span style={{ fontSize:15 }}>{sc.emoji}</span>
                <span>{sc.label}</span>
                {active && <div style={{ marginLeft:'auto', width:4, height:4, borderRadius:'50%', background: sc.glowColor }}/>}
              </button>
            );
          })}
        </div>

        {/* ── Menu grid ── */}
        <div style={{
          flex:1, overflowY:'auto', padding:'12px 10px',
          display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:9, alignContent:'start',
        }}>
          {filteredMenu.map(item => (
            <MenuCard
              key={item.id}
              item={item}
              history={priceMap[item.id]}
              onOrder={handleOrder}
            />
          ))}
        </div>

        <OrderHistoryPanel orders={orders} total={total} />
      </div>

      {pending && (
        <ConfirmModal
          item={pending.item}
          currentPrice={pending.currentPrice}
          onConfirm={handleConfirm}
          onCancel={() => setPending(null)}
        />
      )}
      {toast && <SentToast item={toast} onDone={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
