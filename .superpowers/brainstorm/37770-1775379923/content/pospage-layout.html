<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POSPage Design — Section 1</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: {
          50:'#f0f5ff',100:'#dde8ff',200:'#c0d4ff',300:'#95b6ff',
          400:'#6492ff',500:'#2b70ef',600:'#2250df',700:'#1a40b5',
          800:'#13318d',900:'#0e266a',950:'#07194e'
        }
      },
      fontFamily: {
        sans: ['Inter','Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP','sans-serif']
      }
    }
  }
}
</script>
<style>
  body { margin: 0; font-family: Inter, 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #f1f5f9; }
  .sidebar { transition: width 0.2s ease; }
  .nav-label { transition: opacity 0.15s ease, width 0.2s ease; }
  .collapsed .nav-label { opacity: 0; width: 0; overflow: hidden; white-space: nowrap; }
  .collapsed .sidebar { width: 56px; }
  .collapsed .brand-text { display: none; }
  .collapsed .nav-btn { justify-content: center; padding-left: 0; padding-right: 0; }
  .collapsed .nav-btn .icon-wrap { margin-right: 0; }
  .collapsed .sidebar-footer-text { display: none; }
  .preview-label {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    background: #1e293b; color: #f8fafc; font-size: 11px; padding: 3px 10px;
    border-radius: 20px; white-space: nowrap; z-index: 10; pointer-events: none;
  }
</style>
</head>
<body>
  <div style="padding:24px;">
    <div style="font-family:Inter,sans-serif;font-size:13px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;">Section 1 — POSPage レイアウト &amp; サイドバー</div>
    <div style="font-size:13px;color:#64748b;margin-bottom:16px;">サイドバーの「←」ボタンで折りたたみをプレビューできます。これでよければ「OK」と伝えてください。</div>

    <!-- MOCKUP WRAPPER -->
    <div style="border:1px solid #e2e8f0;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);height:580px;display:flex;flex-direction:column;">

      <!-- APP SHELL -->
      <div id="appShell" style="display:flex;flex:1;overflow:hidden;">

        <!-- SIDEBAR -->
        <aside id="sidebar" class="sidebar" style="width:224px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;">

          <!-- Brand header -->
          <div style="padding:16px 14px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:10px;flex-shrink:0;">
            <div style="width:32px;height:32px;background:#2b70ef;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3m8 0h3a2 2 0 0 0 2-2v-3"/></svg>
            </div>
            <div class="brand-text" style="min-width:0;">
              <div style="font-size:13px;font-weight:800;color:#0f172a;line-height:1.2;">Sports Bar</div>
              <div style="font-size:10px;color:#94a3b8;font-weight:500;">POS 管理画面</div>
            </div>
            <button onclick="toggleSidebar()" style="margin-left:auto;width:24px;height:24px;border:none;background:none;cursor:pointer;color:#94a3b8;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-radius:4px;" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='none'">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
          </div>

          <!-- Nav -->
          <nav style="flex:1;padding:8px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;">

            <!-- Active item -->
            <button class="nav-btn" style="width:100%;display:flex;align-items:center;gap:10px;padding:8px 10px;background:#eff6ff;border-radius:8px;border:none;cursor:pointer;text-align:left;">
              <span class="icon-wrap" style="width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2b70ef" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
              </span>
              <span class="nav-label" style="font-size:13px;font-weight:600;color:#2b70ef;">レジ画面</span>
            </button>

            <button class="nav-btn" style="width:100%;display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;border:none;cursor:pointer;background:none;text-align:left;" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='none'">
              <span class="icon-wrap" style="width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </span>
              <span class="nav-label" style="font-size:13px;color:#475569;">テーブル管理</span>
            </button>

            <button class="nav-btn" style="width:100%;display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;border:none;cursor:pointer;background:none;text-align:left;" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='none'">
              <span class="icon-wrap" style="width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
              </span>
              <span class="nav-label" style="font-size:13px;color:#475569;">商品管理</span>
            </button>

            <button class="nav-btn" style="width:100%;display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;border:none;cursor:pointer;background:none;text-align:left;" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='none'">
              <span class="icon-wrap" style="width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
              </span>
              <span class="nav-label" style="font-size:13px;color:#475569;">カテゴリ管理</span>
            </button>

            <button class="nav-btn" style="width:100%;display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;border:none;cursor:pointer;background:none;text-align:left;" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='none'">
              <span class="icon-wrap" style="width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4"/></svg>
              </span>
              <span class="nav-label" style="font-size:13px;color:#475569;">価格エンジン</span>
            </button>

            <button class="nav-btn" style="width:100%;display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;border:none;cursor:pointer;background:none;text-align:left;" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='none'">
              <span class="icon-wrap" style="width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
              </span>
              <span class="nav-label" style="font-size:13px;color:#475569;">売上管理</span>
            </button>

            <button class="nav-btn" style="width:100%;display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;border:none;cursor:pointer;background:none;text-align:left;" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='none'">
              <span class="icon-wrap" style="width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              </span>
              <span class="nav-label" style="font-size:13px;color:#475569;">伝票情報</span>
            </button>

            <button class="nav-btn" style="width:100%;display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;border:none;cursor:pointer;background:none;text-align:left;" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='none'">
              <span class="icon-wrap" style="width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              </span>
              <span class="nav-label" style="font-size:13px;color:#475569;">システム管理</span>
            </button>

            <!-- Divider + external links -->
            <div style="height:1px;background:#f1f5f9;margin:6px 4px;"></div>

            <a style="width:100%;display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;text-decoration:none;" class="nav-btn" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='none'">
              <span class="icon-wrap" style="width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
              </span>
              <span class="nav-label" style="font-size:13px;color:#94a3b8;">価格ボード <span style="font-size:10px;">↗</span></span>
            </a>

            <a style="width:100%;display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;text-decoration:none;" class="nav-btn" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='none'">
              <span class="icon-wrap" style="width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
              </span>
              <span class="nav-label" style="font-size:13px;color:#94a3b8;">キッチン <span style="font-size:10px;">↗</span></span>
            </a>
          </nav>

          <!-- Footer status -->
          <div style="padding:12px;border-top:1px solid #f1f5f9;flex-shrink:0;">
            <div style="background:#f8fafc;border-radius:8px;border:1px solid #f1f5f9;padding:10px 12px;">
              <div class="sidebar-footer-text" style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;">テーブル稼働</div>
              <div style="display:flex;align-items:baseline;gap:4px;">
                <span style="font-size:20px;font-weight:900;color:#0f172a;">3</span>
                <span class="nav-label" style="font-size:13px;color:#94a3b8;font-weight:500;">/ 8 席</span>
              </div>
            </div>
          </div>
        </aside>

        <!-- MAIN AREA -->
        <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">

          <!-- Content header -->
          <header style="background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 24px;display:flex;align-items:center;justify-content:between;flex-shrink:0;">
            <div style="display:flex;align-items:center;gap:12px;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2b70ef" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
              <div>
                <div style="font-size:15px;font-weight:700;color:#0f172a;">レジ画面</div>
                <div style="font-size:11px;color:#94a3b8;margin-top:1px;">テーブル選択・注文</div>
              </div>
            </div>
          </header>

          <!-- Table grid -->
          <div style="flex:1;overflow-y:auto;padding:20px;background:#f8fafc;">
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">

              <!-- Occupied table (blue) -->
              <div style="background:#fff;border:1.5px solid #bfdbfe;border-radius:12px;overflow:hidden;cursor:pointer;box-shadow:0 1px 8px rgba(43,112,239,0.08);">
                <div style="padding:8px 12px 6px;border-bottom:1px solid #eff6ff;">
                  <span style="font-size:10px;font-weight:700;color:#2b70ef;text-transform:uppercase;letter-spacing:.04em;">テーブル</span>
                </div>
                <div style="padding:10px 12px;">
                  <div style="font-size:13px;font-weight:700;color:#0f172a;">T-1</div>
                  <div style="font-size:16px;font-weight:900;color:#2b70ef;margin-top:4px;">¥3,200</div>
                  <div style="font-size:11px;color:#94a3b8;margin-top:2px;display:flex;align-items:center;gap:3px;">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    00:45
                  </div>
                </div>
              </div>

              <!-- Empty table -->
              <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;cursor:pointer;">
                <div style="padding:8px 12px 6px;border-bottom:1px solid #f8fafc;">
                  <span style="font-size:10px;font-weight:700;color:#cbd5e1;text-transform:uppercase;letter-spacing:.04em;">テーブル</span>
                </div>
                <div style="padding:10px 12px;">
                  <div style="font-size:13px;font-weight:700;color:#94a3b8;">T-2</div>
                  <div style="visibility:hidden;font-size:16px;font-weight:900;">¥0</div>
                  <div style="visibility:hidden;font-size:11px;">00:00</div>
                </div>
              </div>

              <!-- Occupied table (blue) -->
              <div style="background:#fff;border:1.5px solid #bfdbfe;border-radius:12px;overflow:hidden;cursor:pointer;box-shadow:0 1px 8px rgba(43,112,239,0.08);">
                <div style="padding:8px 12px 6px;border-bottom:1px solid #eff6ff;">
                  <span style="font-size:10px;font-weight:700;color:#2b70ef;text-transform:uppercase;letter-spacing:.04em;">テーブル</span>
                </div>
                <div style="padding:10px 12px;">
                  <div style="font-size:13px;font-weight:700;color:#0f172a;">T-3</div>
                  <div style="font-size:16px;font-weight:900;color:#2b70ef;margin-top:4px;">¥5,800</div>
                  <div style="font-size:11px;color:#94a3b8;margin-top:2px;display:flex;align-items:center;gap:3px;">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    01:20
                  </div>
                </div>
              </div>

              <!-- Empty table -->
              <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;cursor:pointer;">
                <div style="padding:8px 12px 6px;border-bottom:1px solid #f8fafc;">
                  <span style="font-size:10px;font-weight:700;color:#cbd5e1;text-transform:uppercase;letter-spacing:.04em;">テーブル</span>
                </div>
                <div style="padding:10px 12px;">
                  <div style="font-size:13px;font-weight:700;color:#94a3b8;">T-4</div>
                  <div style="visibility:hidden;font-size:16px;font-weight:900;">¥0</div>
                  <div style="visibility:hidden;font-size:11px;">00:00</div>
                </div>
              </div>

              <!-- Counter (blue, same) -->
              <div style="background:#fff;border:1.5px solid #bfdbfe;border-radius:12px;overflow:hidden;cursor:pointer;box-shadow:0 1px 8px rgba(43,112,239,0.08);">
                <div style="padding:8px 12px 6px;border-bottom:1px solid #eff6ff;">
                  <span style="font-size:10px;font-weight:700;color:#2b70ef;text-transform:uppercase;letter-spacing:.04em;">カウンター</span>
                </div>
                <div style="padding:10px 12px;">
                  <div style="font-size:13px;font-weight:700;color:#0f172a;">C-1</div>
                  <div style="font-size:16px;font-weight:900;color:#2b70ef;margin-top:4px;">¥1,200</div>
                  <div style="font-size:11px;color:#94a3b8;margin-top:2px;display:flex;align-items:center;gap:3px;">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    00:15
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let collapsed = false;
    function toggleSidebar() {
      collapsed = !collapsed;
      const sidebar = document.getElementById('sidebar');
      const labels = document.querySelectorAll('.nav-label');
      const brandTexts = document.querySelectorAll('.brand-text');
      const footerTexts = document.querySelectorAll('.sidebar-footer-text');
      const navBtns = document.querySelectorAll('.nav-btn');
      const chevron = document.querySelector('button svg path[d="M15 18l-6-6 6-6"]');

      if (collapsed) {
        sidebar.style.width = '56px';
        labels.forEach(el => { el.style.display = 'none'; });
        brandTexts.forEach(el => { el.style.display = 'none'; });
        footerTexts.forEach(el => { el.style.display = 'none'; });
        navBtns.forEach(el => { el.style.justifyContent = 'center'; el.style.padding = '8px 0'; });
      } else {
        sidebar.style.width = '224px';
        labels.forEach(el => { el.style.display = ''; });
        brandTexts.forEach(el => { el.style.display = ''; });
        footerTexts.forEach(el => { el.style.display = ''; });
        navBtns.forEach(el => { el.style.justifyContent = ''; el.style.padding = '8px 10px'; });
      }
    }
  </script>
</body>
</html>
