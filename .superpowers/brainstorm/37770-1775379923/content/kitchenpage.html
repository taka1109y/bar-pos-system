<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KitchenPage Design</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: {
          50:'#f0f5ff',100:'#dde8ff',200:'#c0d4ff',300:'#95b6ff',
          400:'#6492ff',500:'#2b70ef',600:'#2250df',700:'#1a40b5',
        }
      },
      fontFamily: {
        sans: ['Inter','Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP','sans-serif']
      }
    }
  }
}
</script>
<style>body { margin:0; font-family: Inter,'Hiragino Sans','Noto Sans JP',sans-serif; background:#f1f5f9; }</style>
</head>
<body>
<div style="padding:24px;">
  <div style="font-size:13px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;">Section 2 — KitchenPage</div>
  <div style="font-size:13px;color:#64748b;margin-bottom:16px;">meltaライトテーマ適用。赤ハイライト（10分超）は維持。</div>

  <div style="border:1px solid #e2e8f0;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);background:#f8fafc;">

    <!-- Header -->
    <header style="background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:36px;height:36px;background:#fef3c7;border-radius:10px;display:flex;align-items:center;justify-content:center;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
        </div>
        <div>
          <div style="font-size:16px;font-weight:800;color:#0f172a;line-height:1.2;">キッチン</div>
          <div style="font-size:11px;color:#94a3b8;margin-top:1px;">オープン注文 リアルタイム表示</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="font-size:13px;font-weight:600;padding:5px 12px;border-radius:20px;background:#fef3c7;color:#92400e;">4 件対応中</span>
        <button style="font-size:12px;color:#64748b;padding:6px 12px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;font-weight:500;">更新</button>
      </div>
    </header>

    <!-- Table -->
    <div style="padding:20px;">
      <div style="background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden;">

        <!-- Table header -->
        <div style="display:grid;grid-template-columns:110px 130px 1fr 56px 96px 96px;background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:10px 16px;">
          <span style="font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em;">受注時刻</span>
          <span style="font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em;">テーブル</span>
          <span style="font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em;">商品名</span>
          <span style="font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em;text-align:center;">数量</span>
          <span style="font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em;text-align:center;">提供完了</span>
          <span style="font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em;text-align:center;">キャンセル</span>
        </div>

        <!-- Normal row -->
        <div style="display:grid;grid-template-columns:110px 130px 1fr 56px 96px 96px;padding:12px 16px;align-items:center;border-bottom:1px solid #f1f5f9;background:#fff;">
          <div>
            <div style="font-size:13px;color:#0f172a;font-weight:600;font-family:monospace;">19:32:10</div>
            <div style="font-size:11px;color:#94a3b8;margin-top:1px;">2分経過</div>
          </div>
          <div style="font-size:13px;font-weight:700;color:#0f172a;">T-3</div>
          <div style="font-size:13px;color:#334155;font-weight:500;">ハイボール</div>
          <div style="font-size:14px;font-weight:800;color:#0f172a;text-align:center;">× 2</div>
          <div style="display:flex;justify-content:center;">
            <button style="padding:5px 12px;background:#2b70ef;color:#fff;font-size:12px;font-weight:700;border-radius:8px;border:none;cursor:pointer;">提供完了</button>
          </div>
          <div style="display:flex;justify-content:center;">
            <button style="padding:5px 12px;background:#f1f5f9;color:#64748b;font-size:12px;font-weight:600;border-radius:8px;border:none;cursor:pointer;">キャンセル</button>
          </div>
        </div>

        <!-- Normal row 2 -->
        <div style="display:grid;grid-template-columns:110px 130px 1fr 56px 96px 96px;padding:12px 16px;align-items:center;border-bottom:1px solid #f1f5f9;background:#fff;">
          <div>
            <div style="font-size:13px;color:#0f172a;font-weight:600;font-family:monospace;">19:30:45</div>
            <div style="font-size:11px;color:#94a3b8;margin-top:1px;">4分経過</div>
          </div>
          <div style="font-size:13px;font-weight:700;color:#0f172a;">C-1</div>
          <div style="font-size:13px;color:#334155;font-weight:500;">から揚げ</div>
          <div style="font-size:14px;font-weight:800;color:#0f172a;text-align:center;">× 1</div>
          <div style="display:flex;justify-content:center;">
            <button style="padding:5px 12px;background:#2b70ef;color:#fff;font-size:12px;font-weight:700;border-radius:8px;border:none;cursor:pointer;">提供完了</button>
          </div>
          <div style="display:flex;justify-content:center;">
            <button style="padding:5px 12px;background:#f1f5f9;color:#64748b;font-size:12px;font-weight:600;border-radius:8px;border:none;cursor:pointer;">キャンセル</button>
          </div>
        </div>

        <!-- Urgent row (10分超 — 赤ハイライト維持) -->
        <div style="display:grid;grid-template-columns:110px 130px 1fr 56px 96px 96px;padding:12px 16px;align-items:center;border-bottom:1px solid #fecaca;background:#fff5f5;border-left:3px solid #ef4444;">
          <div>
            <div style="font-size:13px;color:#991b1b;font-weight:600;font-family:monospace;">19:20:05</div>
            <div style="font-size:11px;color:#ef4444;font-weight:700;margin-top:1px;">14分経過 ⚠</div>
          </div>
          <div style="font-size:13px;font-weight:700;color:#7f1d1d;">T-1</div>
          <div style="font-size:13px;color:#7f1d1d;font-weight:500;">枝豆</div>
          <div style="font-size:14px;font-weight:800;color:#7f1d1d;text-align:center;">× 3</div>
          <div style="display:flex;justify-content:center;">
            <button style="padding:5px 12px;background:#2b70ef;color:#fff;font-size:12px;font-weight:700;border-radius:8px;border:none;cursor:pointer;">提供完了</button>
          </div>
          <div style="display:flex;justify-content:center;">
            <button style="padding:5px 12px;background:#fee2e2;color:#ef4444;font-size:12px;font-weight:600;border-radius:8px;border:none;cursor:pointer;">キャンセル</button>
          </div>
        </div>

        <!-- Normal row 3 -->
        <div style="display:grid;grid-template-columns:110px 130px 1fr 56px 96px 96px;padding:12px 16px;align-items:center;background:#fff;">
          <div>
            <div style="font-size:13px;color:#0f172a;font-weight:600;font-family:monospace;">19:33:22</div>
            <div style="font-size:11px;color:#94a3b8;margin-top:1px;">1分経過</div>
          </div>
          <div style="font-size:13px;font-weight:700;color:#0f172a;">T-2</div>
          <div style="font-size:13px;color:#334155;font-weight:500;">生ビール</div>
          <div style="font-size:14px;font-weight:800;color:#0f172a;text-align:center;">× 4</div>
          <div style="display:flex;justify-content:center;">
            <button style="padding:5px 12px;background:#2b70ef;color:#fff;font-size:12px;font-weight:700;border-radius:8px;border:none;cursor:pointer;">提供完了</button>
          </div>
          <div style="display:flex;justify-content:center;">
            <button style="padding:5px 12px;background:#f1f5f9;color:#64748b;font-size:12px;font-weight:600;border-radius:8px;border:none;cursor:pointer;">キャンセル</button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
</body>
</html>
