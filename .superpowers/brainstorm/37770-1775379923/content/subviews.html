<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sub-views Design</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: {
          50:'#f0f5ff',100:'#dde8ff',200:'#c0d4ff',300:'#95b6ff',
          400:'#6492ff',500:'#2b70ef',600:'#2250df',700:'#1a40b5',
        }
      },
      fontFamily: { sans: ['Inter','Hiragino Sans','Noto Sans JP','sans-serif'] }
    }
  }
}
</script>
<style>body{margin:0;font-family:Inter,'Hiragino Sans','Noto Sans JP',sans-serif;background:#f1f5f9;}</style>
</head>
<body>
<div style="padding:24px;display:flex;flex-direction:column;gap:32px;">

  <div>
    <div style="font-size:13px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;">Section 3 — サブビュー（モーダル・リスト・フォーム）</div>
    <div style="font-size:13px;color:#64748b;margin-bottom:20px;">MenuManager/TableManager 等のコンポーネントに適用するデザイン共通仕様。</div>
  </div>

  <!-- ROW 1: Modal + Form -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;">

    <!-- Modal Shell -->
    <div>
      <div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">モーダル（追加・編集）</div>
      <div style="background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.08);">
        <!-- Modal header -->
        <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #f1f5f9;">
          <span style="font-size:15px;font-weight:700;color:#0f172a;">テーブルを追加</span>
          <button style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:none;background:none;cursor:pointer;color:#94a3b8;" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='none'">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <!-- Form body -->
        <div style="padding:20px;display:flex;flex-direction:column;gap:16px;">
          <div>
            <label style="display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:6px;">テーブル名</label>
            <input value="テーブル 5" style="width:100%;padding:8px 12px;font-size:14px;border:1px solid #cbd5e1;border-radius:8px;outline:none;box-sizing:border-box;color:#0f172a;font-family:inherit;" readonly />
          </div>
          <div>
            <label style="display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:6px;">種別</label>
            <div style="display:flex;gap:8px;">
              <button style="flex:1;padding:8px;border-radius:8px;border:1.5px solid #2b70ef;background:#eff6ff;color:#2b70ef;font-size:13px;font-weight:600;cursor:pointer;">テーブル</button>
              <button style="flex:1;padding:8px;border-radius:8px;border:1.5px solid #e2e8f0;background:#fff;color:#64748b;font-size:13px;font-weight:500;cursor:pointer;">カウンター</button>
            </div>
          </div>
        </div>
        <!-- Modal footer -->
        <div style="display:flex;gap:8px;padding:16px 20px;border-top:1px solid #f1f5f9;">
          <button style="flex:1;height:40px;padding:0 16px;font-size:14px;font-weight:500;background:#fff;color:#475569;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;">キャンセル</button>
          <button style="flex:1;height:40px;padding:0 16px;font-size:14px;font-weight:600;background:#2b70ef;color:#fff;border:none;border-radius:8px;cursor:pointer;">保存する</button>
        </div>
      </div>
    </div>

    <!-- List view (TableManager) -->
    <div>
      <div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">リストビュー（テーブル管理）</div>
      <div style="background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden;">
        <!-- List header with add button -->
        <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #f1f5f9;">
          <span style="font-size:14px;font-weight:700;color:#0f172a;">テーブル一覧</span>
          <button style="display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px;background:#2b70ef;color:#fff;font-size:13px;font-weight:600;border:none;border-radius:8px;cursor:pointer;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            追加
          </button>
        </div>
        <!-- Table header row -->
        <div style="display:grid;grid-template-columns:1fr 80px 80px;background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:8px 16px;">
          <span style="font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em;">名前</span>
          <span style="font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em;">種別</span>
          <span style="font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em;text-align:right;">操作</span>
        </div>
        <!-- Rows -->
        <div style="divide-y:1px solid #f1f5f9;">
          <div style="display:grid;grid-template-columns:1fr 80px 80px;padding:10px 16px;align-items:center;border-bottom:1px solid #f8fafc;">
            <span style="font-size:13px;font-weight:600;color:#0f172a;">T-1</span>
            <span style="font-size:11px;font-weight:600;padding:2px 8px;background:#eff6ff;color:#2b70ef;border-radius:20px;display:inline-block;">テーブル</span>
            <div style="display:flex;justify-content:flex-end;gap:4px;">
              <button style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:1px solid #e2e8f0;border-radius:6px;background:#fff;cursor:pointer;color:#64748b;">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:1px solid #fecaca;border-radius:6px;background:#fff5f5;cursor:pointer;color:#ef4444;">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
              </button>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 80px 80px;padding:10px 16px;align-items:center;border-bottom:1px solid #f8fafc;">
            <span style="font-size:13px;font-weight:600;color:#0f172a;">T-2</span>
            <span style="font-size:11px;font-weight:600;padding:2px 8px;background:#eff6ff;color:#2b70ef;border-radius:20px;display:inline-block;">テーブル</span>
            <div style="display:flex;justify-content:flex-end;gap:4px;">
              <button style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:1px solid #e2e8f0;border-radius:6px;background:#fff;cursor:pointer;color:#64748b;">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:1px solid #fecaca;border-radius:6px;background:#fff5f5;cursor:pointer;color:#ef4444;">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
              </button>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 80px 80px;padding:10px 16px;align-items:center;">
            <span style="font-size:13px;font-weight:600;color:#0f172a;">C-1</span>
            <span style="font-size:11px;font-weight:600;padding:2px 8px;background:#f0fdf4;color:#16a34a;border-radius:20px;display:inline-block;">カウンター</span>
            <div style="display:flex;justify-content:flex-end;gap:4px;">
              <button style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:1px solid #e2e8f0;border-radius:6px;background:#fff;cursor:pointer;color:#64748b;">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:1px solid #fecaca;border-radius:6px;background:#fff5f5;cursor:pointer;color:#ef4444;">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ROW 2: MenuManager form (more fields) -->
  <div>
    <div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">商品編集フォーム（MenuManager — 多フィールド版）</div>
    <div style="background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden;max-width:520px;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #f1f5f9;">
        <span style="font-size:15px;font-weight:700;color:#0f172a;">商品を編集</span>
        <button style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:none;background:none;cursor:pointer;color:#94a3b8;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div style="padding:20px;display:flex;flex-direction:column;gap:14px;">
        <!-- Row 1 -->
        <div>
          <label style="display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:6px;">商品名</label>
          <input value="スーパードライ" style="width:100%;padding:8px 12px;font-size:14px;border:1px solid #cbd5e1;border-radius:8px;outline:none;box-sizing:border-box;color:#0f172a;font-family:inherit;" readonly />
        </div>
        <!-- Row 2: category + subcategory -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div>
            <label style="display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:6px;">カテゴリ</label>
            <div style="position:relative;">
              <select style="width:100%;appearance:none;padding:8px 32px 8px 12px;font-size:14px;border:1px solid #cbd5e1;border-radius:8px;background:#fff;color:#0f172a;font-family:inherit;cursor:pointer;outline:none;box-sizing:border-box;">
                <option>ドリンク</option>
              </select>
              <svg style="position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>
          <div>
            <label style="display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:6px;">サブカテゴリ</label>
            <div style="position:relative;">
              <select style="width:100%;appearance:none;padding:8px 32px 8px 12px;font-size:14px;border:1px solid #cbd5e1;border-radius:8px;background:#fff;color:#0f172a;font-family:inherit;cursor:pointer;outline:none;box-sizing:border-box;">
                <option>ビール</option>
              </select>
              <svg style="position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>
        </div>
        <!-- Row 3: prices -->
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
          <div>
            <label style="display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:6px;">基準価格</label>
            <input value="500" style="width:100%;padding:8px 12px;font-size:14px;border:1px solid #cbd5e1;border-radius:8px;outline:none;box-sizing:border-box;font-family:inherit;" readonly />
          </div>
          <div>
            <label style="display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:6px;">最低価格</label>
            <input value="350" style="width:100%;padding:8px 12px;font-size:14px;border:1px solid #cbd5e1;border-radius:8px;outline:none;box-sizing:border-box;font-family:inherit;" readonly />
          </div>
          <div>
            <label style="display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:6px;">最高価格</label>
            <input value="1000" style="width:100%;padding:8px 12px;font-size:14px;border:1px solid #cbd5e1;border-radius:8px;outline:none;box-sizing:border-box;font-family:inherit;" readonly />
          </div>
        </div>
        <!-- Toggle badges: is_drink -->
        <div>
          <label style="display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:6px;">種別</label>
          <div style="display:flex;gap:8px;">
            <button style="flex:1;padding:7px;border-radius:8px;border:1.5px solid #2b70ef;background:#eff6ff;color:#2b70ef;font-size:13px;font-weight:600;cursor:pointer;">ドリンク</button>
            <button style="flex:1;padding:7px;border-radius:8px;border:1.5px solid #e2e8f0;background:#fff;color:#64748b;font-size:13px;font-weight:500;cursor:pointer;">フード</button>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:8px;padding:16px 20px;border-top:1px solid #f1f5f9;">
        <button style="flex:1;height:40px;font-size:14px;font-weight:500;background:#fff;color:#475569;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;">キャンセル</button>
        <button style="flex:1;height:40px;font-size:14px;font-weight:600;background:#2b70ef;color:#fff;border:none;border-radius:8px;cursor:pointer;">保存する</button>
      </div>
    </div>
  </div>

  <!-- ROW 3: Confirm/Delete modal -->
  <div>
    <div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">確認モーダル（削除・キャンセル）</div>
    <div style="background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden;max-width:360px;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #f1f5f9;">
        <span style="font-size:15px;font-weight:700;color:#0f172a;">削除しますか？</span>
      </div>
      <div style="padding:16px 20px;">
        <p style="font-size:13px;color:#64748b;line-height:1.6;">「T-1」を削除します。この操作は元に戻せません。</p>
      </div>
      <div style="display:flex;gap:8px;padding:16px 20px;border-top:1px solid #f1f5f9;">
        <button style="flex:1;height:40px;font-size:14px;font-weight:500;background:#fff;color:#475569;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;">戻る</button>
        <button style="flex:1;height:40px;font-size:14px;font-weight:700;background:#ef4444;color:#fff;border:none;border-radius:8px;cursor:pointer;">削除する</button>
      </div>
    </div>
  </div>

</div>
</body>
</html>
