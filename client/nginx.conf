map $http_upgrade $connection_upgrade {
    default   upgrade;
    ''        keep-alive;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # multerのアップロード上限(5MB)に合わせる。nginxの既定値(1MB)のままだとスマホ写真等が
    # multerに届く前に413 Request Entity Too Largeで弾かれてしまう
    client_max_body_size 6m;

    # セキュリティヘッダー
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 隠しファイル・ディレクトリへのアクセス禁止
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # アップロード画像（Docker volume から直接配信）
    location /uploads/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # 静的アセット（ハッシュ付きファイル名）は長期キャッシュ
    location ~* \.(js|css|woff|woff2|ttf|eot|ico|svg|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # バックエンドAPIへのプロキシ
    location /api/ {
        proxy_pass         http://server:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering    off;
        proxy_read_timeout 3600s;
    }

    # Socket.io WebSocketプロキシ
    location /socket.io/ {
        proxy_pass         http://server:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering    off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA: index.html はキャッシュしない（デプロイ後に即反映）
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA: React Routerのパスを全てindex.htmlにフォールバック
    location / {
        try_files $uri $uri/ /index.html;
    }
}
