services:
  postgres:
    container_name: bar-pos-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    # DBは外部公開しない（同一Dockerネットワーク内のみ）。デバッグ時のみ有効化:
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  server:
    container_name: bar-pos-server
    build: ./server
    environment:
      TZ: Asia/Tokyo
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # LAN内の複数端末（iPad等）からアクセスするため全オリジン許可（LAN内限定運用）
      CLIENT_ORIGIN: "*"
    # serverは外部公開しない（nginx経由でのみアクセス）。デバッグ時のみ有効化:
    # ports:
    #   - "3001:3001"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(3001,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  client:
    container_name: bar-pos-client
    build: ./client
    environment:
      TZ: Asia/Tokyo
    ports:
      # LAN内のすべてのIPから port 80 でアクセス可能
      # 例: http://192.168.1.x/ からブラウザでアクセスできる
      - "80:80"
    volumes:
      - uploads:/usr/share/nginx/html/uploads
    depends_on:
      - server
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pg_data:
  uploads:
