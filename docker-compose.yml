services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bardb
      POSTGRES_USER: bar
      POSTGRES_PASSWORD: bar
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bar -d bardb"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://bar:bar@postgres:5432/bardb
      CLIENT_ORIGIN: http://localhost
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  client:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  pg_data:
