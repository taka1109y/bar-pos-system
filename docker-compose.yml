services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bardb
      POSTGRES_USER: bar
      POSTGRES_PASSWORD: bar
    volumes:
      - pg_data:/var/lib/postgresql/data
    # --- テスト用: DBに外部から直接接続したい場合はコメントを外す ---
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bar -d bardb"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://bar:bar@postgres:5432/bardb
      # ─── 本番用 (localhost固定) ───────────────────────────────────────
      # CLIENT_ORIGIN: http://localhost
      # ─── テスト用 (LANからのWebSocket/CORS接続を許可) ────────────────
      # 切り替え方法: 上の CLIENT_ORIGIN 行をコメントアウトし、下の行を有効にする
      CLIENT_ORIGIN: "*"
    # --- テスト用: serverに外部から直接APIアクセスしたい場合はコメントを外す ---
    # ports:
    #   - "3001:3001"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  client:
    build: ./client
    ports:
      # LAN内のすべてのIPから port 80 でアクセス可能
      # 例: http://192.168.1.x/ からブラウザでアクセスできる
      - "80:80"
    volumes:
      - uploads:/usr/share/nginx/html/uploads
    depends_on:
      - server
    restart: unless-stopped

volumes:
  pg_data:
  uploads:
